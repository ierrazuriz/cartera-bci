<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cartera BCI — EL y EMF SPA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root {
      --bci-navy:  #003366;
      --bci-blue:  #2E75B6;
      --bci-lblue: #BDD7EE;
      --bci-vlight:#DEEAF1;
      --bci-yellow:#FFFFC0;
    }
    body { background:#f4f7fb; font-family:'Calibri', 'Segoe UI', sans-serif; font-size:14px; }

    /* Header */
    .bci-header {
      background: var(--bci-navy);
      color: #fff;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .bci-header h1 { font-size:1.2rem; margin:0; font-weight:700; letter-spacing:.3px; }
    .bci-header .badge-fecha { background:rgba(255,255,255,.15); padding:4px 12px;
      border-radius:20px; font-size:.8rem; }

    /* Section titles */
    .section-title {
      background: var(--bci-blue);
      color: #fff;
      padding: 6px 14px;
      font-weight: 700;
      font-size: .85rem;
      letter-spacing: .5px;
      border-radius: 4px 4px 0 0;
      text-transform: uppercase;
    }

    /* Tables */
    .tbl-cartera { width:100%; border-collapse:collapse; font-size:13px; }
    .tbl-cartera thead th {
      background: var(--bci-blue);
      color: #fff;
      padding: 7px 10px;
      text-align:right;
      font-weight:600;
      font-size:.78rem;
      white-space:nowrap;
    }
    .tbl-cartera thead th:first-child { text-align:left; }
    .tbl-cartera tbody tr:nth-child(even) { background: var(--bci-vlight); }
    .tbl-cartera tbody td { padding:5px 10px; border-bottom:1px solid #dce6f0; }
    .tbl-cartera tbody td.num { text-align:right; font-variant-numeric:tabular-nums; }
    .tbl-cartera tbody td.cen { text-align:center; }
    .tbl-cartera .tr-total td {
      background: var(--bci-blue);
      color: #fff;
      font-weight:700;
      padding:7px 10px;
    }
    .tbl-cartera .tr-total td.num { text-align:right; }

    /* Patrimonio cards */
    .pat-card {
      background: var(--bci-navy);
      color: #fff;
      border-radius: 8px;
      padding: 18px 22px;
    }
    .pat-card .label { font-size:.75rem; opacity:.75; text-transform:uppercase; letter-spacing:.5px; }
    .pat-card .valor { font-size:1.6rem; font-weight:700; letter-spacing:-.5px; }
    .pat-card .sub   { font-size:.82rem; opacity:.7; margin-top:4px; }

    /* Sign colors */
    .pos { color: #1a7a3c; font-weight:600; }
    .neg { color: #c0392b; font-weight:600; }

    /* Nemotécnico badge */
    .nem { font-weight:700; color: var(--bci-navy); font-size:.82rem; background:var(--bci-lblue);
      padding:1px 6px; border-radius:3px; display:inline-block; }

    /* Price form */
    .price-form { background:#fff; border:1px solid var(--bci-lblue); border-radius:8px;
      padding:16px 20px; margin-bottom:20px; }
    .price-form label { font-size:.75rem; font-weight:700; color: var(--bci-navy);
      display:block; margin-bottom:2px; }
    .price-form input[type=number], .price-form input[type=text] {
      border:1px solid #b0cce0; border-radius:4px; padding:4px 8px;
      font-size:13px; width:100%; background: var(--bci-yellow);
    }
    .price-form input:focus { outline:2px solid var(--bci-blue); border-color: var(--bci-blue); }
    .price-group-title { font-size:.7rem; font-weight:700; text-transform:uppercase;
      letter-spacing:.5px; color:#888; margin-bottom:6px; margin-top:10px; }

    /* Compact note */
    .nota { font-size:.75rem; color:#777; font-style:italic; }
    .vencida-badge { background:#fde8e8; color:#c0392b; font-size:.7rem;
      padding:0 5px; border-radius:3px; font-weight:600; }
    .ok-badge { background:#e8f5e9; color:#1a7a3c; font-size:.7rem;
      padding:0 5px; border-radius:3px; font-weight:600; }

    /* Company tabs */
    .nav-tabs .nav-link { color: var(--bci-navy); font-weight:600; }
    .nav-tabs .nav-link.active { background: var(--bci-navy); color:#fff; border-color: var(--bci-navy); }

    .card-section { background:#fff; border-radius:0 0 6px 6px;
      border:1px solid var(--bci-lblue); border-top:none; padding:0; margin-bottom:24px;
      box-shadow:0 2px 6px rgba(0,0,0,.06); overflow:hidden; }
  </style>
</head>
<body>

<div class="bci-header">
  <div>
    <h1><i class="bi bi-briefcase-fill me-2"></i>Cartera BCI — EL LTDA &amp; EMF SPA</h1>
    <div class="mt-1" style="font-size:.8rem;opacity:.7;">Bci Corredor de Bolsa · Base: 27/03/2026</div>
  </div>
  <div class="badge-fecha">
    <i class="bi bi-calendar3 me-1"></i>{{ hoy|fdate }}
  </div>
</div>

<nav style="background:var(--bci-blue);padding:0 24px;">
  <div class="d-flex gap-1 py-1">
    <a href="{{ url_for('index') }}"
       class="btn btn-sm {% if request.endpoint == 'index' %}btn-light{% else %}btn-outline-light{% endif %}"
       style="font-size:.78rem;font-weight:600">
      <i class="bi bi-briefcase me-1"></i>Cartera
    </a>
    <a href="{{ url_for('facturas') }}"
       class="btn btn-sm {% if request.endpoint == 'facturas' %}btn-light{% else %}btn-outline-light{% endif %}"
       style="font-size:.78rem;font-weight:600">
      <i class="bi bi-receipt me-1"></i>Facturas
    </a>
  </div>
</nav>

<div class="container-fluid px-3 py-3">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
